spring.application.name=demo

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nguyencuuminhphu_2123110424}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=${PORT:8080}

upload.path.base=./uploads

jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
jwt.expiration=86400000

# Cloudinary Config - Lấy từ Biến môi trường
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}